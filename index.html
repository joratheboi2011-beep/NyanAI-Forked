<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyanAI - Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col md:flex-row">

    <div class="w-full md:w-80 bg-gray-800 p-6 border-b md:border-b-0 md:border-r border-gray-700 flex flex-col justify-between">
        <div>
            <h1 class="text-2xl font-bold text-indigo-400 mb-6 flex items-center gap-2">
                <span>🐱</span> NyanAI Studio
            </h1>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-1">API Endpoint / Proxy</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.yourproxy.com/v1" 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">API Key / Token</label>
                <input type="password" id="apiKey" placeholder="sk-..." 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-1">Select AI Model</label>
                <select id="modelSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="veo-3">Veo 3</option>
                    <option value="seedream-4.5">Seedream 4.5</option>
                    <option value="seedream-4">Seedream 4</option>
                    <option value="nano-banana">Nano Banana</option>
                    <option value="seedance-2.0">Seedance 2.0</option>
                    <option value="seedance-1.0">Seedance 1.0</option>
                    <option value="veo-2">Veo 2</option>
                    <option value="veo">Veo</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">Aspect Ratio</label>
                <div class="grid grid-cols-3 gap-2">
                    <button class="ratio-btn bg-indigo-600 p-2 rounded text-xs font-semibold text-center border border-indigo-500" data-ratio="1:1">1:1 Square</button>
                    <button class="ratio-btn bg-gray-700 p-2 rounded text-xs font-semibold text-center border border-transparent hover:bg-gray-600" data-ratio="16:9">16:9 Wide</button>
                    <button class="ratio-btn bg-gray-700 p-2 rounded text-xs font-semibold text-center border border-transparent hover:bg-gray-600" data-ratio="9:16">9:16 Tall</button>
                </div>
            </div>
        </div>

        <div class="text-xs text-gray-500 border-t border-gray-700 pt-4">
            Security Notice: Keys never leave your browser window.
        </div>
    </div>

    <div class="flex-1 p-6 md:p-10 flex flex-col justify-between items-center">
        
        <div class="w-full max-w-2xl bg-gray-800 rounded-xl border border-gray-700 flex-1 flex flex-col items-center justify-center p-4 relative min-h-[400px]">
            <div id="placeholderText" class="text-center text-gray-500">
                <p class="text-5xl mb-2">✨</p>
                <p>Enter your credentials and prompt to visualize your creation</p>
            </div>
            
            <div id="loader" class="hidden text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-400 mx-auto mb-4"></div>
                <p class="text-indigo-300 font-medium">Processing inference...</p>
                <p id="generatingModel" class="text-xs text-gray-500 mt-1"></p>
            </div>

            <img id="outputImage" class="hidden max-h-full max-w-full rounded-lg object-contain shadow-2xl" src="" alt="AI Canvas">
        </div>

        <div class="w-full max-w-2xl mt-6">
            <div class="flex flex-col sm:flex-row gap-3 bg-gray-800 p-3 rounded-xl border border-gray-700 shadow-lg">
                <input type="text" id="promptInput" placeholder="A futuristic neon cat running down a highway..." 
                       class="flex-1 bg-transparent text-white placeholder-gray-500 px-3 py-2 outline-none w-full">
                <button id="generateBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-2.5 rounded-lg transition active:scale-95">
                    Generate
                </button>
            </div>
        </div>
    </div>

    <script>
        // Highlighting ratio selections
        const ratioButtons = document.querySelectorAll('.ratio-btn');
        ratioButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                ratioButtons.forEach(b => b.classList.replace('bg-indigo-600', 'bg-gray-700'));
                ratioButtons.forEach(b => b.classList.replace('border-indigo-500', 'border-transparent'));
                btn.classList.replace('bg-gray-700', 'bg-indigo-600');
                btn.classList.replace('border-transparent', 'border-indigo-500');
            });
        });

        // Pipeline Fetch Interface
        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const modelSelect = document.getElementById('modelSelect');
        const placeholderText = document.getElementById('placeholderText');
        const loader = document.getElementById('loader');
        const outputImage = document.getElementById('outputImage');
        const generatingModel = document.getElementById('generatingModel');

        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            const endpoint = document.getElementById('apiEndpoint').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const model = modelSelect.value;

            if (!prompt || !endpoint || !key) {
                alert("Please fill out your Prompt, API Endpoint, and Secret Key!");
                return;
            }

            placeholderText.classList.add('hidden');
            outputImage.classList.add('hidden');
            loader.classList.remove('hidden');
            generatingModel.innerText = `Calling model architecture: ${modelSelect.options[modelSelect.selectedIndex].text}`;

            try {
                const response = await fetch(`${endpoint}/images/generations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({ model: model, prompt: prompt })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                outputImage.classList.remove('hidden');
                outputImage.src = data.data[0].url; 
            } catch (error) {
                loader.classList.add('hidden');
                placeholderText.classList.remove('hidden');
                alert("Generation Error: " + error.message);
            }
        });
    </script>
</body>
</html>
